name: CI Security & Performance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Security Vulnerability Scan (OSV-Scanner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OSV-Scanner
        # Report known vulnerabilities without blocking the pipeline.
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          # Scan dependencies declared in the project
          scan-args: |-
            --lockfile=package-lock.json

  performance-audit:
    name: Performance Audit (Lighthouse CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build
        env:
          # Dummy build-time credentials. getSupabaseConfig() throws on any value
          # containing "placeholder", so use non-placeholder dummies that let the
          # static build compile (no live Supabase calls happen during the build).
          NEXT_PUBLIC_SUPABASE_URL: https://dummy-ci-build.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-ci-build-anon-key

      - name: Copy static files for standalone server
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
